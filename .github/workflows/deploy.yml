name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - master          # Deploy on every push to master
  workflow_dispatch:  # Allow manual triggers from the Actions tab

# Grant GITHUB_TOKEN the permissions needed to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 – Run tests and lint
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test Python App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        # Tests are skipped gracefully if the tests/ folder is missing
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – Build static site
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    needs: test   # Only build if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static site
        run: python build_static.py

      - name: Verify build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== index.html size ==="
          wc -c dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/    # Upload the generated dist/ folder

  # ─────────────────────────────────────────────────────────────
  # JOB 3 – Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build   # Only deploy after a successful build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
